{% extends "base.html" %}
{% block title %}运行日志 - {{ app_name }}{% endblock %}
{% block content %}
<header class="hero-card compact">
  <div class="hero-copy">
    <p class="eyebrow">Runtime Logs</p>
    <h1>运行日志</h1>
    <p class="muted">这里显示最近的 GOST 和 Caddy systemd 日志。</p>
  </div>
  <a href="{{ url_for('dashboard') }}" class="ghost-button">返回规则</a>
</header>
<section class="panel-card log-card">
  <div class="card-head"><span class="card-kicker">GOST</span><h2>GOST 日志</h2></div>
  <pre class="code-block log-block">{{ gost_logs }}</pre>
</section>
<section class="panel-card log-card">
  <div class="card-head"><span class="card-kicker">Caddy</span><h2>Caddy 日志</h2></div>
  <pre class="code-block log-block">{{ caddy_logs }}</pre>
</section>
{% endblock %}
